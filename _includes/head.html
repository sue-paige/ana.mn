<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0c0d0b" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#e9e4d6" media="(prefers-color-scheme: light)">
<meta name="color-scheme" content="light dark">

<title>{{ page.title | default: site.title }} — {{ site.tagline }}</title>
<meta name="description" content="{{ site.description }}">
<link rel="canonical" href="{{ site.url }}">

<!-- Open Graph / social -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{ site.title }} — {{ site.tagline }}">
<meta property="og:description" content="{{ site.description }}">
<meta property="og:url" content="{{ site.url }}">
<meta property="og:image" content="{{ site.url }}/assets/img/submerge.jpg">
<meta name="twitter:card" content="summary_large_image">

<!-- Favicons -->
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="alternate icon" href="/assets/favicon.ico" sizes="any">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">

<!-- Fonts: preload the two most-used faces, then the face stylesheet -->
<link rel="preload" href="/assets/fonts/archivo-normal-400-900.woff2" as="font" type="font/woff2" crossorigin>
<link rel="preload" href="/assets/fonts/spacegrotesk-normal-500.woff2" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="/assets/fonts/fonts.css">
<link rel="stylesheet" href="/assets/css/main.css">

{% seo title=false %}
